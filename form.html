<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 p-8 flex justify-center">

    <div class="max-w-sm w-full bg-white p-8 rounded shadow">
        <h1 class="text-xl font-bold mb-4 text-slate-800">Giriş Yap</h1>
      <form class="space-y-2">

        <div>
          <label class="text-xs text-slate-600 block mb-1">E-posta:</label>
          <input class="w-full border p-2 rounded text-sm focus:outline-none focus:border-blue-500" type="email" placeholder="E-postanızı girinizi" />
        </div>

        <div>
          <label class="text-xs text-slate-600 block mb-1">Şifre:</label>
          <input class="w-full border p-2 rounded text-sm focus:outline-none focus:border-blue-500" type="password" placeholder="*********" />
        </div>
        <button class="w-full bg-blue-500 text-white font-semibold py-2 rounded hover:bg-blue-800 " type="submit">Giriş Yap</button>

      </form>
    </div>

  </body>
</html>
